<!DOCTYPE html>
<html>
<head>
  <title>Login - Dev Match Secure</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .form-container {
      max-width: 450px;
      margin: 60px auto;
      background: linear-gradient(135deg, rgba(26, 42, 55, 0.9), rgba(30, 50, 65, 0.9));
      padding: 50px 40px;
      border-radius: 16px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease-out;
    }

    .form-container h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #00ffff;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-container p {
      text-align: center;
      color: #b0b8c8;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: #00ffff;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(11, 15, 25, 0.8);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .form-group input::placeholder {
      color: #7a8194;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      background: rgba(11, 15, 25, 0.95);
    }

    .form-container button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00ffff, #00ff88);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
      margin-top: 15px;
    }

    .form-container button:hover {
      background: linear-gradient(135deg, #00ff88, #00ffff);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 255, 136, 0.3);
    }

    .form-container button:active {
      transform: translateY(0);
    }

    .signup-link {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 255, 255, 0.1);
    }

    .signup-link p {
      color: #b0b8c8;
      font-size: 14px;
      margin: 0;
    }

    .signup-link a {
      color: #00ffff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }

    .signup-link a:hover {
      color: #00ff88;
      text-decoration: underline;
    }

    .hero {
      padding: 40px 20px;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <h2 class="logo">Dev-Match Secure</h2>
    <button class="start-btn" onclick="window.location.href='index.html'">Back</button>
  </nav>

  <section class="hero">
    <div class="form-container">
      <h1>Welcome Back</h1>
      <p>Sign in to access your developer profile and find matches</p>

      <form onsubmit="loginUser(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="your.username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="start-btn">Sign In 🔓</button>
      </form>

      <div class="signup-link">
        <p>New to Dev-Match? <a href="signup.html">Create an account</a></p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>

</body>
</html>
