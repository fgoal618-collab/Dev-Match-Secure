<!DOCTYPE html>
<html>
<head>
  <title>Login - Dev Match Secure</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav>
    <h2>Dev-Match Secure</h2>
  </nav>

  <section class="hero">
    <h1>Login to Your Account</h1>

    <form onsubmit="loginUser(event)">
      <input type="text" id="username" placeholder="Enter username" required><br><br>

      <input type="password" id="password" placeholder="Enter password" required><br><br>

      <button type="submit" class="start-btn">Login</button>
    </form>

    <p style="margin-top: 20px; text-align: center;">
      Don't have an account? <a href="signup.html" style="color: cyan; text-decoration: none;">Sign Up Here</a>
    </p>
  </section>

  <script src="script.js"></script>

  <style>
    input {
      width: 100%;
      max-width: 300px;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid cyan;
      border-radius: 5px;
      background-color: #1a1a2e;
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #888;
    }

    button {
      background-color: cyan;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background-color: #00d4d4;
    }

    a {
      color: cyan;
    }
  </style>
</body>
</html>
